# Project rustfmt config.
#
# We deliberately keep this minimal so it stays compatible with both stable
# and nightly rustfmt. Matches the style the repo was already using.

edition = "2021"
max_width = 100
hard_tabs = false
tab_spaces = 4
newline_style = "Unix"
use_field_init_shorthand = true
use_try_shorthand = true
