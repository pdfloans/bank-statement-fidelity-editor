name: Build Single-File Executables

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.89.0

      - name: Cache Cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Upload Windows Executable
        uses: actions/upload-artifact@v4
        with:
          name: dual-core-pdf-pipeline-windows
          path: target/release/dual-core-pdf-pipeline.exe
          retention-days: 14

  build-mac:
    name: Build Mac Executable
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          targets: aarch64-apple-darwin
          components: rustfmt, clippy

      - name: Install Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pymupdf

      - name: Set PYO3_PYTHON
        run: echo "PYO3_PYTHON=$(which python3)" >> $GITHUB_ENV

      - name: Build Release Binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Upload Mac Executable
        uses: actions/upload-artifact@v4
        with:
          name: dual-core-pdf-pipeline-mac
          path: target/aarch64-apple-darwin/release/dual-core-pdf-pipeline
          retention-days: 14
