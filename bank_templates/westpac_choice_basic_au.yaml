  - "Choice"
  - "Basic"
date_format: "%d/%m/%y"
amount_regex: "^-?\\$?[0-9,]+\\.\\d{2}$"
# Layout learned from Westpac ChoiceBasic.pdf.
column_x_ranges:
  date: [60.0, 110.0]
  description: [115.0, 380.0]
  amount: [385.0, 400.0]
  balance: [535.0, 545.0]
